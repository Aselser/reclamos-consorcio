<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reclamo o consulta · Consorcio</title>
<link rel="stylesheet" href="styles.css">
<script src="config.js"></script>
</head>
<body>
<div class="wrap">
  <header class="top">
    <a href="index.html" style="text-decoration:none"><div class="logo">🏢</div></a>
    <div class="brand">
      <h1>Reclamo o consulta</h1>
      <p id="edificio"></p>
    </div>
  </header>

  <div class="card" id="form">
    <div class="seg" id="tipo">
      <div class="opt sel" data-t="reclamo"><span class="emo">🛠️</span>Reclamo / arreglo</div>
      <div class="opt" data-t="consulta"><span class="emo">📝</span>Consulta</div>
    </div>

    <label style="margin-top:16px">Unidad Funcional (Depto)</label>
    <input id="unidad" placeholder="Ej: 4° B">

    <div id="campo-categoria">
      <label>¿Qué pasó?</label>
      <select id="categoria"><option>Plomería / pérdida de agua</option><option>Ascensor</option><option>Electricidad / luces</option><option>Limpieza</option><option>Ruidos molestos</option><option>Otro</option></select>
    </div>

    <label>Contanos el detalle</label>
    <textarea id="detalle" placeholder="Ej: Hay una pérdida de agua en el palier del 4° piso desde ayer."></textarea>

    <label>Adjuntar foto <span style="color:var(--muted)">(opcional)</span></label>
    <label class="drop" for="archivos" id="drop-label" style="display:block">📎 Tocá para sacar una foto o subir un archivo</label>
    <input id="archivos" type="file" accept="image/*,application/pdf" multiple capture="environment" style="display:none">

    <div class="row r2" style="margin-top:6px">
      <div><label>Tu nombre</label><input id="nombre" placeholder="Nombre y apellido"></div>
      <div><label>Teléfono / WhatsApp</label><input id="telefono" type="tel" placeholder="Ej: 11 5555 5555"></div>
    </div>
    <label>Email <span style="color:var(--muted)">(para ver el seguimiento después)</span></label>
    <input id="email" type="email" placeholder="tu@correo.com">

    <button class="btn" id="enviar">Enviar ✓</button>
    <p class="hint" id="msg" style="text-align:center;margin-top:12px"></p>
  </div>

  <div class="card" id="ok" style="display:none;text-align:center">
    <div style="font-size:44px">✅</div>
    <h2 class="section" style="margin-top:8px">¡Enviado!</h2>
    <p class="hint">Tu número de seguimiento es <b id="codigo" style="color:var(--txt);font-size:16px"></b>.<br>Te avisamos las novedades y podés ver el estado cuando quieras.</p>
    <a class="btn" href="seguimiento.html" style="text-decoration:none">Ver el seguimiento</a>
  </div>
</div>

<nav class="demobar">
  <span>Ir a:</span>
  <a class="here" href="reclamos.html">🛠️ Reclamo</a>
  <a href="pagos.html">💰 Pago</a>
  <a href="seguimiento.html">🔎 Seguimiento</a>
  <a href="admin.html">🗂️ Admin</a>
</nav>

<script type="module">
import { crearTicket } from "./app.js";

document.getElementById("edificio").textContent = window.CONFIG?.EDIFICIO || "Consorcio";

let tipo = "reclamo";
document.querySelectorAll('#tipo .opt').forEach(o => {
  o.onclick = () => {
    document.querySelectorAll('#tipo .opt').forEach(x => x.classList.remove('sel'));
    o.classList.add('sel');
    tipo = o.dataset.t;
    document.getElementById('campo-categoria').style.display = (tipo === 'reclamo') ? 'block' : 'none';
  };
});

const inputArch = document.getElementById("archivos");
inputArch.addEventListener("change", () => {
  const n = inputArch.files.length;
  document.getElementById("drop-label").textContent = n ? `📎 ${n} archivo(s) seleccionado(s)` : "📎 Tocá para sacar una foto o subir un archivo";
});

document.getElementById("enviar").addEventListener("click", async () => {
  const msg = document.getElementById("msg");
  const btn = document.getElementById("enviar");
  const datos = {
    tipo,
    unidad: document.getElementById("unidad").value.trim(),
    categoria: tipo === "reclamo" ? document.getElementById("categoria").value : null,
    detalle: document.getElementById("detalle").value.trim(),
    vecino_nombre: document.getElementById("nombre").value.trim(),
    vecino_contacto: document.getElementById("telefono").value.trim(),
    vecino_email: document.getElementById("email").value.trim(),
    origen: "web",
  };
  if (!datos.unidad || (!datos.vecino_email && !datos.vecino_contacto)) { msg.textContent = "Completá la unidad y un email o teléfono."; return; }

  btn.disabled = true; msg.textContent = "Enviando…";
  try {
    const ticket = await crearTicket(datos, inputArch.files);
    document.getElementById("form").style.display = "none";
    document.getElementById("ok").style.display = "block";
    document.getElementById("codigo").textContent = "#" + ticket.codigo;
  } catch (e) {
    msg.textContent = "Ups, no se pudo enviar: " + (e.message || e);
    btn.disabled = false;
  }
});
</script>
</body>
</html>
