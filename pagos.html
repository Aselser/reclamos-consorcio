<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comprobante de pago · Consorcio</title>
<link rel="stylesheet" href="styles.css">
<script src="config.js"></script>
</head>
<body>
<div class="wrap">
  <header class="top">
    <a href="index.html" style="text-decoration:none"><div class="logo">🏢</div></a>
    <div class="brand">
      <h1>Comprobante de pago</h1>
      <p id="edificio"></p>
    </div>
  </header>

  <div class="card" id="form">
    <p class="hint">Subí el comprobante de tu transferencia de expensas. La administración lo verifica contra la cuenta del consorcio.</p>

    <label>Unidad Funcional (Depto)</label>
    <input id="unidad" placeholder="Ej: 4° B">

    <div class="row r2">
      <div><label>Mes que abonás</label><input id="mes" type="month" value="2026-07"></div>
      <div><label>Monto transferido</label><input id="monto" type="number" placeholder="0"></div>
    </div>

    <label>Comprobante <span style="color:var(--muted)">(foto o PDF de la transferencia)</span></label>
    <label class="drop" for="archivos" id="drop-label" style="display:block">📎 Tocá para subir el comprobante</label>
    <input id="archivos" type="file" accept="image/*,application/pdf" multiple capture="environment" style="display:none">

    <label>Comentario <span style="color:var(--muted)">(opcional)</span></label>
    <textarea id="detalle" placeholder="Ej: Pagué expensas de julio + la cuota extra del ascensor."></textarea>

    <div class="row r2" style="margin-top:6px">
      <div><label>Tu nombre</label><input id="nombre" placeholder="Nombre y apellido"></div>
      <div><label>Teléfono / WhatsApp</label><input id="telefono" type="tel" placeholder="Ej: 11 5555 5555"></div>
    </div>
    <label>Email <span style="color:var(--muted)">(para ver el seguimiento después)</span></label>
    <input id="email" type="email" placeholder="tu@correo.com">

    <button class="btn" id="enviar">Enviar comprobante ✓</button>
    <p class="hint" id="msg" style="text-align:center;margin-top:12px"></p>
  </div>

  <div class="card" id="ok" style="display:none;text-align:center">
    <div style="font-size:44px">✅</div>
    <h2 class="section" style="margin-top:8px">¡Comprobante enviado!</h2>
    <p class="hint">Tu número de seguimiento es <b id="codigo" style="color:var(--txt);font-size:16px"></b>.<br>Te avisamos cuando lo verifiquemos.</p>
    <a class="btn" href="seguimiento.html" style="text-decoration:none">Ver el seguimiento</a>
  </div>
</div>

<nav class="demobar">
  <span>Ir a:</span>
  <a href="reclamos.html">🛠️ Reclamo</a>
  <a class="here" href="pagos.html">💰 Pago</a>
  <a href="seguimiento.html">🔎 Seguimiento</a>
  <a href="admin.html">🗂️ Admin</a>
</nav>

<script type="module">
import { crearTicket } from "./app.js";

document.getElementById("edificio").textContent = window.CONFIG?.EDIFICIO || "Consorcio";

const inputArch = document.getElementById("archivos");
inputArch.addEventListener("change", () => {
  const n = inputArch.files.length;
  document.getElementById("drop-label").textContent = n ? `📎 ${n} archivo(s) seleccionado(s)` : "📎 Tocá para subir el comprobante";
});

document.getElementById("enviar").addEventListener("click", async () => {
  const msg = document.getElementById("msg");
  const btn = document.getElementById("enviar");
  const datos = {
    tipo: "pago",
    unidad: document.getElementById("unidad").value.trim(),
    mes: document.getElementById("mes").value,
    monto: parseFloat(document.getElementById("monto").value) || null,
    detalle: document.getElementById("detalle").value.trim(),
    vecino_nombre: document.getElementById("nombre").value.trim(),
    vecino_contacto: document.getElementById("telefono").value.trim(),
    vecino_email: document.getElementById("email").value.trim(),
    origen: "web",
  };
  if (!datos.unidad || (!datos.vecino_email && !datos.vecino_contacto)) { msg.textContent = "Completá la unidad y un email o teléfono."; return; }

  btn.disabled = true; msg.textContent = "Enviando…";
  try {
    const ticket = await crearTicket(datos, inputArch.files);
    document.getElementById("form").style.display = "none";
    document.getElementById("ok").style.display = "block";
    document.getElementById("codigo").textContent = "#" + ticket.codigo;
  } catch (e) {
    msg.textContent = "Ups, no se pudo enviar: " + (e.message || e);
    btn.disabled = false;
  }
});
</script>
</body>
</html>
